name: Check Changeset

on:
  pull_request:
    branches:
      - main

env:
  GITHUB_PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
  GITHUB_PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}

jobs:
  check_changeset:
    name: Check changeset vs changed files
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
    - name: Checkout Repo
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
      with:
        # This makes Actions fetch all Git history so check_changeset script can diff properly.
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Node (22)
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # ratchet:actions/setup-node@v4
      with:
        node-version: 22.10.0
    - name: Find Comment
      # This commit represents v3.1.0
      uses: peter-evans/find-comment@a4ef349b8c29f841860ce94ed82b20f0a39b6961
      id: fc
      with:
        issue-number: ${{github.event.number}}
        body-includes: Changeset File Check
    - name: Add a changeset for @firebase/app
      # pull main so changeset can diff against it
      run: |
        git pull -f --no-rebase origin main:main
        yarn ts-node-script scripts/ci/add_changeset.ts
